<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="50%" style="stop-color:#1a1e3e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#627eea"/>
      <stop offset="100%" style="stop-color:#3b5998"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3776AB"/>
      <stop offset="100%" style="stop-color:#FFD43B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#627eea" stroke-width="1">
    <line x1="0" y1="0" x2="1280" y2="640"/>
    <line x1="1280" y1="0" x2="0" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="540" r="200" fill="#627eea" opacity="0.03"/>
  <circle cx="1180" cy="100" r="250" fill="#3776AB" opacity="0.04"/>

  <!-- Ethereum diamond (right side) -->
  <g transform="translate(1020, 240) scale(1.2)" opacity="0.12">
    <polygon points="0,-120 70,0 0,40 -70,0" fill="#627eea"/>
    <polygon points="0,40 70,0 0,120 -70,0" fill="#3b5998"/>
  </g>

  <!-- Accent line top -->
  <rect x="100" y="120" width="80" height="4" rx="2" fill="url(#accent)"/>

  <!-- Title -->
  <text x="100" y="195" font-family="'SF Mono', 'Fira Code', 'Consolas', monospace" font-size="72" font-weight="bold" fill="#ffffff" letter-spacing="-2">
    py-ethclient
  </text>

  <!-- Subtitle -->
  <text x="100" y="245" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#8b949e">
    Python Ethereum Execution Client
  </text>

  <!-- Tagline -->
  <text x="100" y="295" font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="#627eea" font-style="italic">
    Built from scratch in pure Python
  </text>

  <!-- Feature pills -->
  <g transform="translate(100, 340)">
    <rect x="0" y="0" width="72" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="36" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">EVM</text>

    <rect x="84" y="0" width="78" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="123" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">RLPx</text>

    <rect x="174" y="0" width="82" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="215" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">eth/68</text>

    <rect x="268" y="0" width="88" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="312" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">snap/1</text>

    <rect x="368" y="0" width="120" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="428" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">Engine API</text>

    <rect x="500" y="0" width="112" height="32" rx="16" fill="#627eea" opacity="0.15"/>
    <text x="556" y="21" font-family="'SF Mono', monospace" font-size="14" fill="#627eea" text-anchor="middle">JSON-RPC</text>
  </g>

  <!-- Stats -->
  <g transform="translate(100, 430)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="42" font-weight="bold" fill="#ffffff">15,271</text>
    <text x="0" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#8b949e">Lines of Code</text>

    <text x="250" y="0" font-family="'SF Mono', monospace" font-size="42" font-weight="bold" fill="#ffffff">593</text>
    <text x="250" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#8b949e">Tests Passing</text>

    <text x="430" y="0" font-family="'SF Mono', monospace" font-size="42" font-weight="bold" fill="#ffffff">140+</text>
    <text x="430" y="28" font-family="-apple-system, sans-serif" font-size="16" fill="#8b949e">EVM Opcodes</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="530" width="1280" height="1" fill="#627eea" opacity="0.2"/>

  <!-- Python badge -->
  <rect x="100" y="560" width="120" height="30" rx="15" fill="#3776AB" opacity="0.3"/>
  <text x="160" y="580" font-family="-apple-system, sans-serif" font-size="14" fill="#3776AB" text-anchor="middle" font-weight="600">Python 3.12+</text>

  <!-- MIT badge -->
  <rect x="235" y="560" width="70" height="30" rx="15" fill="#238636" opacity="0.3"/>
  <text x="270" y="580" font-family="-apple-system, sans-serif" font-size="14" fill="#238636" text-anchor="middle" font-weight="600">MIT</text>

  <!-- GitHub org -->
  <text x="1180" y="580" font-family="-apple-system, sans-serif" font-size="16" fill="#8b949e" text-anchor="end">
    tokamak-network
  </text>
</svg>
